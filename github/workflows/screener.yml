name: Smart Money Screener

on:
  schedule:
    # Universe rebuild — duminica 20:00 UTC
    - cron: '0 20 * * 0'

    # Scan dimineata — Luni-Vineri 13:00 UTC = 08:00 ET (summer) / 08:00 EST (winter)
    - cron: '0 13 * * 1-5'

    # Enrich dupa scan — 13:45 UTC (45 min dupa scan, sa fie date complete)
    - cron: '45 13 * * 1-5'

    # Enrich dupa inchidere — 21:30 UTC = 16:30 ET
    - cron: '30 21 * * 1-5'

  # Permite rulare manuala din GitHub UI (util pentru debug)
  workflow_dispatch:
    inputs:
      phase:
        description: 'Faza de rulat'
        required: true
        default: 'scan'
        type: choice
        options:
          - universe
          - scan
          - enrich

jobs:
  run-screener:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Detecteaza faza din cron sau input manual
        id: detect-phase
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "phase=${{ github.event.inputs.phase }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            MIN=$(date -u +%M)
            DOW=$(date -u +%u)  # 7 = duminica

            if [ "$DOW" = "7" ] && [ "$HOUR" = "20" ]; then
              echo "phase=universe" >> $GITHUB_OUTPUT
            elif [ "$HOUR" = "13" ] && [ "$MIN" -lt "30" ]; then
              echo "phase=scan" >> $GITHUB_OUTPUT
            else
              echo "phase=enrich" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Ruleaza faza
        run: python collectors/run.py --phase ${{ steps.detect-phase.outputs.phase }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
          FMP_KEY: ${{ secrets.FMP_KEY }}
